apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: todo-app
  labels:
    app: todo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
      - name: todo-app
        image: todo-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8282
          name: http
        env:
        - name: SPRING_CONFIG_LOCATION
          value: "classpath:/application.properties,file:/config/application.properties"
        - name: SERVER_PORT
          value: "8282"
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: "health,info"
        - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW-DETAILS
          value: "always"
        volumeMounts:
        - name: config-volume
          mountPath: /config
          readOnly: true
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8282
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8282
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: config-volume
        configMap:
          name: todo-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: todo-app-service
  namespace: todo-app
  labels:
    app: todo-app
spec:
  selector:
    app: todo-app
  ports:
  - name: http
    port: 80
    targetPort: 8282
    protocol: TCP
  type: LoadBalancer 