apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
spec:
  project: gatekeeper
  source:
    repoURL: https://github.com/open-policy-agent/gatekeeper.git
    chart: gatekeeper
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - Prune=true

